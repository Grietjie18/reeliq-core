name: Daily SST Fetch

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install copernicusmarine numpy shapely xarray h5py h5netcdf

      - name: Configure Copernicus credentials
        env:
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: |
          copernicusmarine login --username "$COPERNICUS_USERNAME" --password "$COPERNICUS_PASSWORD" --force-overwrite

      - name: Fetch SST data
        env:
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python fetch_satellite.py

      - name: Commit satellite data
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add satellite_sst.json
          git commit -m "Daily SST update $(date +%Y-%m-%d)" || exit 0
          git push
